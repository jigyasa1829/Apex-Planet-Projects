<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="container">
        <h1>My To-Do List✅</h1>
        
        <div class="input-section">
            <input type="text" id="todoInput" placeholder="Add a new task..." maxlength="200">
            <button id="addBtn">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="todo-stats">
            <span id="totalTasks">0</span> total tasks • 
            <span id="completedTasks">0</span> completed • 
            <span id="pendingTasks">0</span> pending
        </div>

        <div id="todoList"></div>

        <button id="clearAllBtn" class="clear-all-btn" style="display: none;">Clear All Tasks</button>
    </div>
    <script src="todo.js"></script>
</body>
</html>
